name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # System ffmpeg is preferred even though we bundle a fallback.
      # This keeps the test matrix testing the system path; the bundled
      # path has its own unit test.
      - name: Install system ffmpeg
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install ffmpeg
          else
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Lint
        run: ruff check src tests

